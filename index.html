<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RuzFiles</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      margin: 15px 0;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #result {
      margin-top: 20px;
      word-break: break-all;
    }

    a {
      color: #00ff9d;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>☁️ RuzFiles</h1>

    <input type="file" id="file">
    <br>
    <button onclick="upload()">Subir archivo</button>

    <div id="result"></div>
  </div>

  <script>
    async function upload() {
      const fileInput = document.getElementById("file");
      const file = fileInput.files[0];

      if (!file) {
        alert("Selecciona un archivo");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      document.getElementById("result").innerHTML = `
        <p>✅ Archivo subido</p>
        <a href="${data.link}" target="_blank">${data.link}</a>
      `;
    }
  </script>

</body>
</html>
